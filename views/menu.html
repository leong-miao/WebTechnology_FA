<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - QIU Online Ordering</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <h1>QIU<span>Food</span></h1>
            </div>
            <nav>
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/menu" class="active">Menu</a></li>
                    <li><a href="/cart">Cart <span class="cart-count" style="display: none;">0</span></a></li>
                    <li><a href="/dashboard">Dashboard</a></li>
                    <li><a href="/order-history">My Orders</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h1>Our Menu</h1>
        
        <div class="filters">
            <label for="category-filter">Filter by Category:</label>
            <select id="category-filter">
                <option value="all">All Categories</option>
                <option value="Malay">Malay</option>
                <option value="Chinese">Chinese</option>
                <option value="Indian">Indian</option>
                <option value="Western">Western</option>
                <option value="Beverages">Beverages</option>
            </select>
        </div>

        <div class="menu-grid">
            <!-- Menu items will be loaded dynamically -->
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 QIU Online Ordering System</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
</body>
</html>
